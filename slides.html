<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Frontend Slides · 模板预览库</title>
<style>
  * { box-sizing: border-box; }
  :root {
    --ink: #16181d; --muted: #6b7280; --line: #e6e7ea; --bg: #f6f7f9;
    --card: #ffffff; --brand: #4f46e5; --brand-soft: #eef2ff;
  }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", Roboto, sans-serif;
    background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased;
  }
  header.top {
    position: sticky; top: 0; z-index: 30; background: rgba(255,255,255,.88);
    backdrop-filter: blur(10px); border-bottom: 1px solid var(--line); padding: 14px 24px;
  }
  .top-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .brandmark { font-weight: 800; font-size: 18px; letter-spacing: -.02em; }
  .brandmark span { color: var(--brand); }
  .sub { color: var(--muted); font-size: 13px; }
  .grow { flex: 1; }
  .search {
    border: 1px solid var(--line); background: #fff; border-radius: 10px; padding: 9px 12px;
    font-size: 14px; width: 240px; outline: none;
  }
  .search:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft); }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; align-items: center; }
  .filter-label { font-size: 12px; color: var(--muted); margin-right: 2px; }
  .chip {
    border: 1px solid var(--line); background: #fff; color: var(--ink); border-radius: 999px;
    padding: 6px 12px; font-size: 12.5px; cursor: pointer; transition: .12s; user-select: none;
  }
  .chip:hover { border-color: #c9cbd1; }
  .chip.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .count { font-size: 13px; color: var(--muted); margin-left: auto; }
  main { padding: 22px 24px 120px; max-width: 1500px; margin: 0 auto; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 20px; }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px; overflow: hidden;
    display: flex; flex-direction: column; transition: .15s; cursor: pointer;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(20,24,40,.10); border-color: #d7d9df; }
  .card.selected { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft); }
  /* thumbnail: 16:9 styled mini title slide */
  .thumb { position: relative; width: 100%; aspect-ratio: 16/9; overflow: hidden; }
  .thumb .stage { position: absolute; inset: 0; padding: 22px 24px; display: flex; flex-direction: column; justify-content: center; }
  .thumb .kick { font-size: 10px; letter-spacing: .22em; text-transform: uppercase; opacity: .85; margin-bottom: 10px; font-weight: 700; }
  .thumb .ttl { font-size: 30px; line-height: 1.02; font-weight: 800; letter-spacing: -.02em; margin: 0; }
  .thumb .tl { font-size: 11px; line-height: 1.35; margin-top: 12px; max-width: 92%; opacity: .9; }
  .thumb .rule { height: 3px; width: 46px; margin-top: 14px; border-radius: 2px; }
  .thumb .dots { position: absolute; bottom: 12px; left: 24px; display: flex; gap: 6px; }
  .thumb .dot { width: 13px; height: 13px; border-radius: 50%; box-shadow: inset 0 0 0 1px rgba(0,0,0,.12); }
  .thumb .scheme-tag { position: absolute; top: 12px; right: 12px; font-size: 9px; letter-spacing: .12em; text-transform: uppercase; padding: 3px 7px; border-radius: 6px; font-weight: 700; }
  .body { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 10px; }
  .name-row { display: flex; align-items: baseline; gap: 8px; }
  .name { font-size: 16px; font-weight: 750; letter-spacing: -.01em; }
  .slug { font-size: 11px; color: var(--muted); font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  .tagline { font-size: 12.5px; color: #4b5563; line-height: 1.45; margin: 0; }
  .tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag { font-size: 10.5px; color: #555; background: #f1f2f4; border-radius: 6px; padding: 2px 7px; }
  .tag.mood { background: #eef2ff; color: #4338ca; }
  .meta { display: flex; gap: 6px; font-size: 10.5px; color: var(--muted); flex-wrap: wrap; }
  .meta b { color: #374151; font-weight: 600; }
  .actions { display: flex; gap: 8px; margin-top: 2px; }
  .btn { flex: 1; border: 1px solid var(--line); background: #fff; border-radius: 9px; padding: 8px; font-size: 12.5px; cursor: pointer; transition: .12s; font-weight: 600; }
  .btn:hover { border-color: #c9cbd1; }
  .btn.primary { background: var(--ink); color: #fff; border-color: var(--ink); }
  .btn.primary:hover { background: #000; }
  .card.selected .btn.primary { background: var(--brand); border-color: var(--brand); }
  /* detail drawer */
  .overlay { position: fixed; inset: 0; background: rgba(15,18,30,.45); z-index: 50; display: none; }
  .overlay.open { display: block; }
  .drawer {
    position: fixed; top: 0; right: 0; height: 100%; width: min(560px, 94vw); background: #fff; z-index: 60;
    transform: translateX(100%); transition: transform .25s ease; overflow-y: auto; box-shadow: -10px 0 40px rgba(0,0,0,.18);
  }
  .drawer.open { transform: translateX(0); }
  .drawer .dhead { position: sticky; top: 0; background: #fff; border-bottom: 1px solid var(--line); padding: 16px 20px; display: flex; align-items: center; gap: 10px; z-index: 2; }
  .drawer .dclose { margin-left: auto; border: none; background: #f1f2f4; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 16px; }
  .drawer .dbody { padding: 0 20px 40px; }
  .big-thumb { aspect-ratio: 16/9; border-radius: 12px; overflow: hidden; margin: 18px 0; position: relative; }
  .sec { margin-top: 22px; }
  .sec h4 { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin: 0 0 8px; }
  .sec p { margin: 0; font-size: 13.5px; line-height: 1.6; color: #374151; }
  .swatches { display: flex; flex-wrap: wrap; gap: 8px; }
  .sw { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .sw i { width: 40px; height: 40px; border-radius: 8px; display: block; box-shadow: inset 0 0 0 1px rgba(0,0,0,.1); }
  .sw small { font-size: 9px; color: var(--muted); font-family: ui-monospace, Menlo, monospace; }
  .avoid { background: #fef2f2; border: 1px solid #fecaca; border-radius: 10px; padding: 12px 14px; }
  .avoid p { color: #991b1b; }
  .fontlist { display: flex; flex-wrap: wrap; gap: 6px; }
  .fontlist .tag { background: #f3f4f6; }
  .usecmd { margin-top: 22px; background: #0b0d12; color: #e8eaf0; border-radius: 10px; padding: 14px 16px; font-size: 12.5px; line-height: 1.6; }
  .usecmd code { font-family: ui-monospace, Menlo, monospace; color: #9ae6b4; }
  .copyslug { border: 1px solid #2a2d36; background: #1a1d25; color: #fff; border-radius: 7px; padding: 6px 10px; font-size: 12px; cursor: pointer; margin-top: 10px; }
  /* selection bar */
  .selbar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 40; background: #fff; border-top: 1px solid var(--line);
    padding: 12px 24px; display: none; align-items: center; gap: 14px; box-shadow: 0 -6px 24px rgba(0,0,0,.06);
  }
  .selbar.show { display: flex; }
  .selbar .pick { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .selbar .pick i { width: 26px; height: 26px; border-radius: 6px; display: inline-block; box-shadow: inset 0 0 0 1px rgba(0,0,0,.12); }
  .selbar code { font-family: ui-monospace, Menlo, monospace; background: #f1f2f4; padding: 3px 8px; border-radius: 6px; font-size: 12.5px; }
  .selbar .copybtn { margin-left: auto; background: var(--brand); color: #fff; border: none; border-radius: 9px; padding: 9px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #16181d; color: #fff; padding: 10px 18px; border-radius: 10px; font-size: 13px; opacity: 0; transition: .2s; z-index: 80; pointer-events: none; }
  .toast.show { opacity: 1; }
  .empty { text-align: center; color: var(--muted); padding: 60px; font-size: 14px; }
</style>
</head>
<body>
<header class="top">
  <div class="top-row">
    <div>
      <div class="brandmark">Frontend Slides · <span>模板预览库</span></div>
      <div class="sub">Beautiful HTML Templates - Bold Design Pack · 共 34 套模板 · 点击卡片查看细节，选中后复制 slug 用于生成</div>
    </div>
    <div class="grow"></div>
    <input id="search" class="search" placeholder="搜索名称 / 风格 / 关键词…">
  </div>
  <div class="filters" id="filters"></div>
</header>
<main>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">没有匹配的模板，试试清除筛选。</div>
</main>

<div class="overlay" id="overlay"></div>
<aside class="drawer" id="drawer">
  <div class="dhead">
    <strong id="d-name"></strong><span class="slug" id="d-slug"></span>
    <button class="dclose" id="d-close">✕</button>
  </div>
  <div class="dbody" id="d-body"></div>
</aside>

<div class="selbar" id="selbar">
  <div class="pick"><i id="sel-color"></i> 已选模板：<strong id="sel-name"></strong> <code id="sel-slug"></code></div>
  <button class="copybtn" id="sel-copy">复制 slug</button>
</div>
<div class="toast" id="toast"></div>

<script>
const DATA = [{"slug": "8-bit-orbit", "name": "8-Bit Orbit", "tagline": "Pixel-art neon arcade aesthetic on a deep navy void.", "mood": ["retro-tech", "playful", "cyberpunk", "energetic"], "tone": ["geeky", "neon", "rebellious", "sci-fi"], "formality": "low", "density": "medium", "scheme": "dark", "best_for": "Anything that should feel like a CRT screen at 2am: cyberpunk, gaming, web3, indie dev tools, hackathon demos. Just as good for a tech talk that wants to lean into nostalgic-digital craft, a synthwave brand deck, or a creative review that wants to feel like a console.", "avoid_for": "Contexts where the dark neon palette would actively work against the message — quiet institutional finance disclosures, healthcare patient-facing materials, traditional luxury.", "palette": [{"name": "dark-void", "hex": "#0A0E27"}, {"name": "deep-navy", "hex": "#0F1B3D"}, {"name": "neon-cyan", "hex": "#5EDCF4"}, {"name": "neon-pink", "hex": "#F0A6CA"}, {"name": "neon-yellow", "hex": "#F4D03F"}, {"name": "soft-lavender", "hex": "#E2D5F2"}, {"name": "white", "hex": "#FFFFFF"}], "typography": ["Tektur", "Chakra Petch", "Chinese or other CJK text"], "snapshot": "A retro-futuristic pixel-art presentation system that fuses 16-bit arcade nostalgia with editorial discipline. Display type runs in Tektur (a chunky geometric display face built on pixel-grid logic) paired with Chakra Petch for body and Space Mono for code-flavored labels and tabular data. The palette pivots on a deep cosmic navy (#0F1B3D / #0A0E27) lit by three saturated neons — cyan, hot pink, and a high-key yellow — with a soft lavender pastel for warm reprieves. Depth is built from stacked hard offset shadows in 4px increments (the pixel unit), CRT scanlines, atmospheric grain, vignettes, and animated starfields. The effect sits between an arcade cabinet and a Tron-era boardroom — unmistakably digital, intentionally lo-fi, and engineered to feel as if it just booted up.", "colors": {"bg": "#0A0E27", "fg": "#FFFFFF", "accent": "#F4D03F", "accent2": "#5EDCF4"}}, {"slug": "biennale-yellow", "name": "Biennale Yellow", "tagline": "Solar yellow on warm parchment with deep indigo serif and atmospheric sun-glow gradients.", "mood": ["editorial", "atmospheric", "warm", "cultural-institution", "poster-like"], "tone": ["literary", "considered", "contemplative", "warm-modern", "Dutch-editorial"], "formality": "high", "density": "medium", "scheme": "light", "best_for": "Anything that should feel like an art-biennale poster or a museum's annual programme: exhibition decks, arts-institution announcements, design conference brochures, curatorial pitches, literary publications, studio retrospectives. Equally good for any deck wanting Dutch-editorial atmosphere with an unmistakable single-color signature.", "avoid_for": "Decks that need visual punch or saturated multi-color energy — the warm-paper canvas and one-yellow palette are intentionally quiet and atmospheric.", "palette": [{"name": "paper", "hex": "#E9E5DB"}, {"name": "paper-deep", "hex": "#DCD6C4"}, {"name": "sun", "hex": "#F1EE2E"}, {"name": "sun-soft", "hex": "#F8F39B"}, {"name": "haze", "hex": "#F0DA7C"}, {"name": "ink", "hex": "#1B2566"}, {"name": "ember", "hex": "#E26B4A"}], "typography": ["Archivo", "Chinese or other CJK text"], "snapshot": "A literary-editorial presentation system in the visual register of an art biennale catalogue or quiet exhibition poster. The aesthetic is built on warm parchment grounds (#E9E5DB) flooded with soft solar yellow (#F1EE2E) radial blooms, set against a single deep indigo navy ink color. Display type is Instrument Serif — a contemporary high-contrast serif with tall ascenders and elegant italics — paired with Archivo for sans-serif chrome and JetBrains Mono for numerical and metadata callouts. No drop shadows, no rounded corners, no bordered cards: the only structural lines are hairline 1px rules in ink. The mood sits between a folded museum brochure, a slow-reading literary quarterly, and a Mediterranean exhibition poster — confident, atmospheric, and deeply restrained.", "colors": {"bg": "#F8F39B", "fg": "#1B2566", "accent": "#F1EE2E", "accent2": "#E26B4A"}}, {"slug": "block-frame", "name": "BlockFrame", "tagline": "Neobrutalist deck with pastel-neon color blocks and chunky black borders.", "mood": ["bold", "playful", "graphic", "fresh"], "tone": ["confident", "graphic", "pop", "design-led"], "formality": "medium-low", "density": "high", "scheme": "light", "best_for": "Anything that should feel pop-graphic and design-led: indie SaaS launches, agency credentials, creative reviews, brand redesigns. Also a strong unexpected pick for tech, finance, or research when the speaker wants to land as confident and contemporary rather than buttoned-up.", "avoid_for": "Contexts that require quiet institutional restraint or traditional weight (regulated disclosures, formal legal briefs).", "palette": [{"name": "black", "hex": "#000000"}, {"name": "white", "hex": "#FFFFFF"}, {"name": "offwhite", "hex": "#FFFDF5"}, {"name": "pink", "hex": "#FE90E8"}, {"name": "blue", "hex": "#C0F7FE"}, {"name": "green", "hex": "#99E885"}, {"name": "yellow", "hex": "#F7CB46"}, {"name": "cream", "hex": "#FFDC8B"}], "typography": ["Chinese or other CJK text"], "snapshot": "A maximalist neobrutalist presentation system built on 4px solid black borders, 8px hard offset shadows, and a high-key candy palette of five saturated pastels plus cream and off-white. Display type runs Inter at weight 800-900 in tight uppercase; secondary chrome uses Space Grotesk as a quasi-monospace label face. Tilted decorative shapes (rotated stars, rectangles, badges) puncture the borders and break the grid intentionally. Pastels are paired loudly: pink + blue + green + yellow + cream cycle through every region with deliberate juxtaposition. The aesthetic borrows from zine layout, 1990s-revival sticker books, and contemporary toy packaging — bold, joyful, slightly chaotic, never timid.", "colors": {"bg": "#FFFFFF", "fg": "#000000", "accent": "#F7CB46", "accent2": "#FFDC8B"}}, {"slug": "blue-professional", "name": "Blue Professional", "tagline": "Cream paper background with electric cobalt blue accents; clean modern professional.", "mood": ["professional", "modern", "calm", "trustworthy"], "tone": ["clean", "considered", "polished", "neutral"], "formality": "medium-high", "density": "medium", "scheme": "light", "best_for": "Anything that should feel modern-considered and lightly authoritative: B2B SaaS pitches, consulting deliverables, advisory updates, investor reports. Also a clean, tasteful choice whenever you want to read as professional without going stiff — research synthesis, internal reviews, brand work for service businesses.", "avoid_for": "Contexts where the deck should feel hot, playful, or intentionally informal — the cool electric-blue restraint will read as overly polished.", "palette": [{"name": "bg", "hex": "#FDFAE7"}, {"name": "primary", "hex": "#1E2BFA"}, {"name": "text", "hex": "#111111"}, {"name": "text-muted", "hex": "#6B6B6B"}, {"name": "text-light", "hex": "#9A9A9A"}, {"name": "positive", "hex": "#059669"}, {"name": "negative", "hex": "#DC2626"}], "typography": ["Chinese or other CJK text"], "snapshot": "A restrained, consulting-grade presentation system on a warm cream canvas (#fdfae7) with a single saturated cobalt blue (#1e2bfa) as the only accent color. Display type runs Space Grotesk for headlines and numerical callouts; Inter handles body and chrome. Cards are soft-tinted cobalt at 4% opacity with 1.5px translucent borders and 10-14px rounded corners — quiet, never bordered in solid color. The aesthetic borrows from investment-research reports, McKinsey-grade quarterly briefings, and contemporary financial dashboards — measured, data-dense without feeling crowded, and unmistakably professional. The system is built for executive readability at distance, with strong typographic hierarchy and a single accent color carrying every emphasis moment.", "colors": {"bg": "#FDFAE7", "fg": "#111111", "accent": "#1E2BFA", "accent2": "#DC2626"}}, {"slug": "bold-poster", "name": "Bold Poster", "tagline": "Editorial poster aesthetic with massive Shrikhand display and a single fire-engine red accent.", "mood": ["bold", "editorial", "loud", "confident"], "tone": ["dramatic", "graphic", "sharp", "intentional"], "formality": "medium", "density": "low", "scheme": "light", "best_for": "Anything that should land like a magazine cover: brand manifestos, founder vision decks, editorial / cultural pitches, creative reviews. Excellent any time you want a few words to feel like a poster — including unexpected fits like a tech keynote or a finance manifesto that wants to be quotable.", "avoid_for": "Decks that need to communicate dense information per slide — the layout is built around a few large statements, not paragraphs of detail.", "palette": [{"name": "bg", "hex": "#FFFFFF"}, {"name": "dark", "hex": "#1C1410"}, {"name": "red", "hex": "#D8000F"}, {"name": "light", "hex": "#F5F2EF"}], "typography": ["Chinese or other CJK text"], "snapshot": "A populist editorial poster system that mashes vintage Italian sports-magazine display lettering with classical serif body and tight monospace metadata. The display face is Shrikhand — a heavy slab/script hybrid with playful italic personality — rendered at poster scale (often 200-320px) and routinely tilted off-axis. Body runs Libre Baskerville for a literary editorial register; Space Grotesk handles tiny uppercase labels and chrome. The palette is uncompromising: white canvas, deep brown-black ink (#1C1410), single saturated tomato red (#D8000F), and a warm off-white (#F5F2EF) for alternating panels. Borders are bold 1.5-3px ink rules; the only shadow is a single stacked offset behind red display text. The aesthetic is loud, confident, and unmistakably print-poster — closer to a 1970s European brand annual report or a wine merchant's catalogue than a contemporary slide deck.", "colors": {"bg": "#FFFFFF", "fg": "#1C1410", "accent": "#D8000F", "accent2": "#1C1410"}}, {"slug": "broadside", "name": "Broadside", "tagline": "Dark editorial canvas with a single fire orange accent and bilingual Latin/Chinese type stack.", "mood": ["editorial", "dramatic", "loud", "newspaper"], "tone": ["graphic", "punchy", "literary", "considered"], "formality": "medium-high", "density": "medium", "scheme": "dark", "best_for": "Anything that should land like a broadside newspaper headline: brand manifestos, magazine and cultural pitches, design talks, bilingual EN/CN decks, founder vision statements. Also a striking pick for tech, research, or business decks that want a dramatic single-accent editorial feel.", "avoid_for": "Decks that need to feel quiet, warm, or institutionally traditional — the dark canvas with fire-orange accent commits to drama.", "palette": [{"name": "ink-black", "hex": "#111111"}, {"name": "ink-black-alt", "hex": "#1A1A18"}, {"name": "fire-orange", "hex": "#E85D26"}, {"name": "cream", "hex": "#F0ECE5"}, {"name": "cream-muted", "hex": "#888880"}, {"name": "cream-hint", "hex": "#505048"}, {"name": "border-dark", "hex": "#282826"}], "typography": ["Barlow", "IBM Plex Mono"], "snapshot": "A protest-poster editorial system built on massive Barlow type and a single fire-orange environment color. The aesthetic is \"ink on fire\" — dark slides for documentation, orange slides for declaration. Display type is enormous (13vw, roughly 187px at 1440 width) in weight 900 lowercase, treating words as graphic elements rather than reading copy. The cultural reference is broadside printing, SPACE10 reports, and Wim Crouwel grids reinterpreted with one loud color and zero decoration.", "colors": {"bg": "#111111", "fg": "#F0ECE5", "accent": "#E85D26", "accent2": "#F0ECE5"}}, {"slug": "capsule", "name": "Capsule", "tagline": "Modular pill-shaped cards on warm bone with a full pastel-pop palette.", "mood": ["playful", "modern", "warm", "fresh", "fun"], "tone": ["upbeat", "graphic", "approachable", "cool"], "formality": "medium-low", "density": "medium", "scheme": "light", "best_for": "Anything that should feel modular, modern, and a little Y2K: lifestyle brands, creator portfolios, DTC launches, beauty / wellness, agency credentials. Also fun for a playful tech demo or a research deck that wants pop-art clarity instead of gravitas.", "avoid_for": "Contexts that require traditional institutional weight — the capsule shapes and pastel pops actively soften authority.", "palette": [{"name": "cream", "hex": "#F5F5F0"}, {"name": "ink", "hex": "#1A1A1A"}, {"name": "outline", "hex": "#1E1E1E"}, {"name": "white", "hex": "#FFFFFF"}, {"name": "coral", "hex": "#E85D4E"}, {"name": "lime", "hex": "#C4D94E"}, {"name": "lavender", "hex": "#C5B5E0"}, {"name": "sky", "hex": "#8BB4F7"}], "typography": ["Bodoni Moda", "Space Grotesk"], "snapshot": "A playful editorial system built on pill-shaped containers, a sun-bleached cream canvas, and a nine-color candy palette. Bodoni Moda serif headlines pair with Space Grotesk body to suggest a literary magazine that took a holiday at a 1970s ice-cream parlor. Every container that holds text is a pill (border-radius 9999px) outlined with a 2px ink stroke, casting a soft 6–12px offset shadow. The aesthetic is \"Memphis-meets-editorial\" — confident typography, generous bordered shapes, and decorative floating pills as atmospheric wallpaper.", "colors": {"bg": "#FFFFFF", "fg": "#1A1A1A", "accent": "#E85D4E", "accent2": "#C4D94E"}}, {"slug": "cartesian", "name": "Cartesian", "tagline": "Quiet warm-neutral palette with classical Playfair serifs; tasteful and unhurried.", "mood": ["quiet", "considered", "elegant", "warm-minimal"], "tone": ["classical", "literary", "restrained", "confident-quiet"], "formality": "high", "density": "low", "scheme": "light", "best_for": "Anything that should feel quiet, considered, and grown-up: investment theses, white papers, advisory work, longform research, gallery / cultural decks. Also a strong choice for editorial features, founder reflections, or any deck where restraint is the message — including across tech and finance.", "avoid_for": "Decks that need visual heat, multiple accents, or a sense of urgency — the warm-neutral palette is intentionally low-energy.", "palette": [{"name": "bg-primary", "hex": "#EDE8E0"}, {"name": "bg-secondary", "hex": "#E2DBD1"}, {"name": "text-primary", "hex": "#1A1A1A"}, {"name": "text-secondary", "hex": "#5A5A5A"}, {"name": "accent", "hex": "#8A8178"}, {"name": "line", "hex": "#B8B0A4"}], "typography": ["Playfair Display", "Inter"], "snapshot": "A quiet, museum-catalog editorial system built on Playfair Display serif headlines, Inter sans body, and a five-tone warm-stone palette. The aesthetic is \"consulting deck meets architectural monograph\" — minimal geometric line decorations (thin circles, dashed arcs, vertical and horizontal hairlines) drift behind content, suggesting drafting paper and compass work. Every divider is a single 1px line in a muted taupe; nothing is bold, nothing is loud. The cultural reference is Massimo Vignelli's editorial work, the Cooper Hewitt catalog, and pencil-and-tracing-paper urban planning documents.", "colors": {"bg": "#EDE8E0", "fg": "#1A1A1A", "accent": "#B8B0A4", "accent2": "#8A8178"}}, {"slug": "cobalt-grid", "name": "Cobalt Grid", "tagline": "Electric cobalt serifs on a graph-paper canvas, anchored by stair-stepped pixel-glitch decorations and slim hairline rules.", "mood": ["editorial", "design-research", "studious", "modernist", "tech-print", "monochrome"], "tone": ["considered", "literary", "studious", "quietly-modern", "editorial"], "formality": "high", "density": "medium", "scheme": "light", "best_for": "Anything that should feel like a quietly serious design / research bulletin, art publication, or curated trend report. Strong for studio annuals, agency capabilities decks, design-research publications, architecture / art / academic decks, and any deck wanting one strict accent colour and a printed-ledger calmness rather than corporate polish.", "avoid_for": "Decks that need warmth, multi-colour energy, or a casual / playful voice — the strict cobalt + cream + grid palette is intentionally austere.", "palette": [{"name": "paper", "hex": "#F0EBDE"}, {"name": "paper-2", "hex": "#E6E0CE"}, {"name": "ink", "hex": "#1F2BE0"}, {"name": "ink-soft", "hex": "#5560E5"}], "typography": ["Newsreader", "Hanken Grotesk", "DM Mono"], "snapshot": "A Japanese-magazine trend-report system built on warm cream paper, electric cobalt ink, and a graph-paper grid that lives permanently behind every slide. Newsreader serif headlines tower at 18vh while DM Mono carries chrome and ticker text. The signature decoration is a pixel-glitch column — vertical scanlines stair-stepped down the right edge of declarative slides — paired with QR-style 8×8 grid patches. The cultural reference is WIRED Japan, Shift magazine, and architectural trend reports printed in two-color risograph: cream + one cobalt.", "colors": {"bg": "#F0EBDE", "fg": "#1F2BE0", "accent": "#1F2BE0", "accent2": "#5560E5"}}, {"slug": "coral", "name": "Coral", "tagline": "Cream and coral on near-black, set in oversized Bebas Neue.", "mood": ["bold", "warm", "modern", "confident"], "tone": ["graphic", "punchy", "magazine"], "formality": "medium", "density": "medium", "scheme": "mixed", "best_for": "Anything that should feel warm-graphic and editorial: fashion, beauty, fitness, F&B, lifestyle brands, agency credentials. Just as strong for a creator portfolio, a manifesto, or a tech / research deck that wants warmth and a single bold accent instead of corporate cool.", "avoid_for": "Contexts that should feel quiet or institutional — the coral accent and oversized Bebas Neue commit hard to a confident magazine voice.", "palette": [{"name": "coral", "hex": "#E85D5D"}, {"name": "coral-dark", "hex": "#D44A4A"}, {"name": "cream", "hex": "#F5F0E8"}, {"name": "cream-dark", "hex": "#E8E0D4"}, {"name": "black", "hex": "#1A1A1A"}, {"name": "gray", "hex": "#6B6B6B"}, {"name": "light-gray", "hex": "#B0B0B0"}, {"name": "white", "hex": "#FFFFFF"}], "typography": ["Bebas Neue", "Inter"], "snapshot": "A bold magazine-poster system that runs on three surface registers — coral fire, ink black, and warm cream — animated by Bebas Neue display caps and a constant 45° diagonal hatch pattern. Inter handles body copy; Bebas Neue handles every headline, stat, title, and meta-figure at heavy letter-spacing. The cultural reference is mid-century travel posters, Saul Bass film titles, and modern editorial sport magazines: solid color planes meeting at hard edges, oversized condensed caps as architectural elements, and a single coral hue used both as accent and as full-slide environment.", "colors": {"bg": "#FFFFFF", "fg": "#1A1A1A", "accent": "#E85D5D", "accent2": "#D44A4A"}}, {"slug": "creative-mode", "name": "Creative Mode", "tagline": "Cream paper canvas with confident multi-color (green, pink, orange, yellow) accents and Archivo Black display.", "mood": ["creative", "confident", "playful", "design-led"], "tone": ["graphic", "expressive", "modern"], "formality": "medium", "density": "medium-high", "scheme": "light", "best_for": "Anything that should feel design-led and confident: creative agency pitches, design studio decks, ad shop credentials, brand creative reviews, art-direction reviews. Also a great unexpected pick for a tech talk, research findings, or finance review when the speaker wants to lead with taste rather than convention.", "avoid_for": "Contexts that demand institutional restraint and a quiet authority — the saturated multi-accent palette will read as expressive, not formal.", "palette": [{"name": "cream", "hex": "#EFE9D9"}, {"name": "cream-2", "hex": "#E4DCC4"}, {"name": "ink", "hex": "#0F0F0F"}, {"name": "ink-2", "hex": "#2A2A2A"}, {"name": "green", "hex": "#1F8A4C"}, {"name": "green-dark", "hex": "#136636"}, {"name": "pink", "hex": "#F06CA8"}, {"name": "pink-dark", "hex": "#D14E8B"}], "typography": ["Archivo Black", "Space Grotesk", "JetBrains Mono"], "snapshot": "A neo-brutalist editorial presentation system built for 1920x1080 slides. The deck anchors on a warm cream canvas with heavy 4px ink borders, hard offset drop-shadows, and a bold four-color accent palette (forest green, hot pink, burnt orange, sunshine yellow). Display headlines run Archivo Black in pure uppercase — aggressive, loud, zero letter-spacing softness. Monospace labels in JetBrains Mono echo a typesetting rule-sheet. Body copy sits in Space Grotesk. Every slide uses flat color-blocking with no gradients, no rounded cards, and no subtlety. The aesthetic is part Bauhaus grid, part punk zine, part Swiss editorial.", "colors": {"bg": "#EFE9D9", "fg": "#0F0F0F", "accent": "#F06CA8", "accent2": "#D14E8B"}}, {"slug": "daisy-days", "name": "Daisy Days", "tagline": "Cheerful pastel deck with hand-drawn daisies, stars, and rainbows. Friendly, soft, and warm.", "mood": ["cheerful", "playful", "warm", "sunny", "wholesome"], "tone": ["friendly", "soft", "encouraging", "approachable", "lighthearted"], "formality": "low", "density": "medium", "scheme": "light", "best_for": "Anything that should feel friendly, soft, and joyful: educational content, kids and family, wellness programs, community workshops, creator portfolios for craft / illustration. Also lovely for an unexpected playful internal kickoff, a wedding planning deck, or any moment where warmth is the message — including across tech or business contexts.", "avoid_for": "Contexts where the audience explicitly expects authority and precision — the hand-drawn pastel SVG decorations are the opposite of buttoned-up.", "palette": [{"name": "cream", "hex": "#F5F0E6"}, {"name": "turquoise", "hex": "#7ECDC0"}, {"name": "soft-pink", "hex": "#F7C8D4"}, {"name": "butter", "hex": "#FDE68A"}, {"name": "mint", "hex": "#A8E6CF"}, {"name": "lavender", "hex": "#D4A5E8"}, {"name": "peach", "hex": "#FFCBA4"}, {"name": "sky", "hex": "#A8D8F0"}], "typography": ["Chinese or other CJK text"], "snapshot": "A cheerful, childlike presentation system built around the chunky display face Fredoka One and the rounded humanist sans Quicksand. The palette is a sunny garden — cream canvas, turquoise, soft pink, butter yellow, mint, lavender, peach, sky blue, and a single coral accent — with charcoal-brown 2D outlines wrapping every shape. Hard offset shadows in dark charcoal, generous border-radius, and hand-drawn SVG decorations (daisies, stars, suns, clouds, rainbows) anchor the aesthetic somewhere between a children's storybook spread and a sticker-sheet kawaii zine.", "colors": {"bg": "#F5F0E6", "fg": "#D4A5E8", "accent": "#FDE68A", "accent2": "#FFCBA4"}}, {"slug": "editorial-forest", "name": "Editorial Forest", "tagline": "Forest green, dusty pink, and warm cream meet Source Serif 4 in a quiet, intentional quarterly-review deck.", "mood": ["editorial", "quiet", "considered", "warm", "intentional"], "tone": ["literary", "thoughtful", "warm", "low-pressure"], "formality": "medium", "density": "medium", "scheme": "mixed", "best_for": "Anything that should feel like a considered editorial — quarterly reviews, internal readouts, studio updates, creative-agency presentations. Equally good for any deck that wants to feel warm and unhurried rather than corporate, including research recaps, book or program announcements, and team retrospectives.", "avoid_for": "Contexts that need to feel urgent, punchy, or sales-driven — the palette and rhythm are intentionally quiet.", "palette": [{"name": "green", "hex": "#2E4A2A"}, {"name": "green-deep", "hex": "#243A21"}, {"name": "green-lite", "hex": "#3A5A36"}, {"name": "pink", "hex": "#E89CB1"}, {"name": "pink-deep", "hex": "#D27E96"}, {"name": "cream", "hex": "#EFE7D4"}, {"name": "cream-2", "hex": "#E6DCC4"}, {"name": "ink", "hex": "#1A1A17"}], "typography": ["JetBrains Mono"], "snapshot": "A serif-led editorial presentation system in the register of a literary quarterly or art-book monograph. Display type runs in Source Serif 4 at weight 500 with optical-size axis engaged, scaling up to 220px for cover and stat moments. The palette pairs a deep forest green (#2e4a2a) with a dusty rose pink (#e89cb1) over an oat-cream paper ground (#efe7d4), with JetBrains Mono as the editorial chrome (labels, captions, axis ticks). The aesthetic is closer to a Penguin classic, Apartamento spread, or quiet annual report than a tech keynote — confident, paper-feeling, and committed to a small color vocabulary.", "colors": {"bg": "#EFE7D4", "fg": "#1A1A17", "accent": "#D27E96", "accent2": "#E89CB1"}}, {"slug": "editorial-tri-tone", "name": "Editorial Tri-Tone", "tagline": "Three-color editorial system: dusty pink, mustard cream, and deep burgundy, set in Bricolage + Instrument Serif.", "mood": ["editorial", "warm", "intentional", "moody"], "tone": ["literary", "warm", "considered", "stylish"], "formality": "medium-high", "density": "medium", "scheme": "mixed", "best_for": "Anything that should feel like a fashion-magazine spread: editorial pitches, fashion brand decks, lifestyle media, art direction reviews. Equally good for any deck — including tech, research, or business — that wants tri-tone discipline and serif/sans contrast instead of the usual neutrals.", "avoid_for": "Decks that need to read as soft or comforting — the burgundy/pink/cream tri-tone is intentionally high-contrast and styled.", "palette": [{"name": "pink", "hex": "#F2B6C6"}, {"name": "butter", "hex": "#F2D86A"}, {"name": "burgundy", "hex": "#7A1F35"}], "typography": ["Bricolage Grotesque", "Instrument Serif", "JetBrains Mono"], "snapshot": "A literary magazine-meets-annual-report presentation system built on a strict three-color palette — blush pink, golden butter, and deep burgundy wine. Despite having eleven CSS variable names, only three hex values exist in the entire system; every alias is a semantic rename of one of those three. Headlines run Bricolage Grotesque (a variable grotesque with an optical-size axis) at extreme weights and negative letter-spacing. Instrument Serif (italic-cut only) appears as the expressive accent face for chapter numerals, pull-quotes, years, and signatures. JetBrains Mono carries all metadata, labels, and section markers at tight uppercase tracking. The aesthetic is \"independent arts publication\" — the kind with a colophon, hand-numbered editions, and an editorial desk.", "colors": {"bg": "#F2D86A", "fg": "#7A1F35", "accent": "#7A1F35", "accent2": "#F2B6C6"}}, {"slug": "emerald-editorial", "name": "Emerald Editorial", "tagline": "A magazine-cover business deck: emerald + navy + paper, double-rule masthead ornaments, and a bold Bodoni-style display serif.", "mood": ["editorial", "considered", "confident", "magazine-cover"], "tone": ["literary", "authoritative", "warm", "designed"], "formality": "medium-high", "density": "medium", "scheme": "mixed", "best_for": "Anything that should feel like the front of a serious magazine, including but not limited to leadership readouts, planning-office reviews, and strategy briefings. The double-rule masthead ornament gives it editorial gravitas without making it stiff — also a great unexpected pick for product launches or research recaps that want to feel considered rather than corporate.", "avoid_for": "Contexts that need to read as quiet, neutral, or institutionally restrained — the emerald field is too saturated to disappear into the background.", "palette": [{"name": "bg", "hex": "#3CD896"}, {"name": "bg-2", "hex": "#2DC684"}, {"name": "bg-3", "hex": "#25B377"}, {"name": "ink", "hex": "#0F1A5C"}, {"name": "ink-2", "hex": "#1B2774"}, {"name": "ink-3", "hex": "#3A4593"}, {"name": "paper", "hex": "#F1E9D6"}], "typography": ["Chinese or other CJK text"], "snapshot": "A bold display-serif editorial system in the register of a fashion masthead or vintage magazine cover. Bodoni Moda runs at weight 900 across a wide scale (44–460px), set against a saturated emerald-green canvas with deep navy ink and oat-paper accents. The signature treatment is a stacked double-rule ornament that brackets centered display words like a 19th-century theatrical playbill. The aesthetic borrows from Harper's Bazaar / Vogue / Wallpaper covers: confident, theatrical, paper-and-ink committed, with a tight three-color palette and zero gradients or shadows.", "colors": {"bg": "#F1E9D6", "fg": "#0F1A5C", "accent": "#3CD896", "accent2": "#2DC684"}}, {"slug": "grove", "name": "Grove", "tagline": "Forest-green canvas with cream type, classical Playfair serifs, and a single rust accent.", "mood": ["organic", "considered", "warm", "literary", "natural"], "tone": ["classical", "warm", "considered", "patient"], "formality": "medium-high", "density": "medium", "scheme": "mixed", "best_for": "Anything that should feel organic, considered, and grown-up: sustainability and wellness brands, outdoor / nature products, wineries and restaurants, literary or arts decks, advisory deliverables, bilingual EN/CN reports. Also a calm, distinctive choice for tech, research, or business decks that want patience over urgency.", "avoid_for": "Decks that need neon energy or rapid-fire pop — the forest-green canvas and Playfair serif commit to a slow, classical voice.", "palette": [{"name": "bg", "hex": "#192B1B"}, {"name": "bg-alt", "hex": "#1E3221"}, {"name": "bg-light", "hex": "#E8E4D6"}, {"name": "bg-light-alt", "hex": "#DEDAD0"}, {"name": "fg", "hex": "#D4CFBF"}, {"name": "fg-light", "hex": "#192B1B"}, {"name": "accent", "hex": "#C8524A"}], "typography": ["Chinese or other CJK text"], "snapshot": "A quiet, editorial-serif presentation system in the register of a well-bound monograph or boutique brand book. Playfair Display at weight 400 (never bold) carries every headline, italicized in terracotta coral for accent emphasis as the signature move. Jost weight 300 carries every paragraph as the \"good paper\" body face. JetBrains Mono at weight 300 holds labels, kickers, and the thin chrome bars. The palette pairs a deep forest green canvas (#192b1b) with warm cream text (#d4cfbf) and a single terracotta coral accent (#c8524a). Generous negative space, hairline 1px borders, and a near-invisible serif watermark numeral give it the calm authority of a literary journal.", "colors": {"bg": "#E8E4D6", "fg": "#192B1B", "accent": "#C8524A", "accent2": "#D4CFBF"}}, {"slug": "long-table", "name": "Long Table", "tagline": "Warm cream and rust-red supper-club aesthetic with bold uppercase grotesk headlines, Fraunces serifs, and pill-shaped outlined buttons.", "mood": ["warm", "intimate", "modern", "friendly", "small-batch", "social", "hospitality"], "tone": ["warm", "playful", "considered", "social", "magazine-friendly", "modern-editorial"], "formality": "medium", "density": "medium", "scheme": "light", "best_for": "Anything that should feel like a warm, intimate, modern hospitality / community brand: supper clubs, dinner series, small restaurants, creative-studio events, membership pitches, lifestyle and wine brands. Equally good for any deck wanting a single warm accent colour, mixed-weight typography, and a social-media-aware modern-editorial voice.", "avoid_for": "Decks that need corporate polish, technical density, or a cold / minimalist register — the rust-red palette and bold serif mix are intentionally warm and people-facing.", "palette": [{"name": "paper", "hex": "#FAF1E2"}, {"name": "paper-d", "hex": "#F2E5CF"}, {"name": "paper-vd", "hex": "#E8D7B6"}, {"name": "ink", "hex": "#B53D2A"}, {"name": "ink-dp", "hex": "#8E2D1F"}, {"name": "rule", "hex": "#B53D2A"}], "typography": ["Bricolage Grotesque", "Fraunces serif", "Chinese or other CJK text"], "snapshot": "A warm, single-ink editorial system in the register of a supper-club poster, a small-batch zine, or a Risograph-printed program. The entire system runs in one ink color — a warm rust terracotta (#B53D2A) — on a buttery cream paper ground (#FAF1E2), with a subtle 4px radial-dot texture overlay giving the surface its \"printed paper\" quality. Display type runs in Bricolage Grotesque at weight 700–800 in uppercase; body and metadata run in Fraunces serif at weight 400–600 with optical-size axis engaged. Pill buttons, outlined edition badges, italic-edition numerals, and dashed/solid 1.5px borders complete the printed-program vocabulary.", "colors": {"bg": "#FAF1E2", "fg": "#8E2D1F", "accent": "#B53D2A", "accent2": "#8E2D1F"}}, {"slug": "mat", "name": "Mat", "tagline": "Dark sage canvas with bone paper and burnt-orange accent; mid-century modern with wood undertones.", "mood": ["warm-modern", "considered", "tactile", "mid-century"], "tone": ["warm", "design-led", "intentional", "considered"], "formality": "medium", "density": "medium", "scheme": "mixed", "best_for": "Anything that should feel mid-century, tactile, and intentional: design studio credentials, architecture / interior brands, ceramics / craft / furniture, advisory decks. Also a warm, distinctive choice for tech, research, or business decks that want a considered analog feel instead of digital-cool.", "avoid_for": "Contexts that need fast tech energy or institutional restraint — the muted sage and burnt-orange palette is intentionally warm and slow.", "palette": [{"name": "bg-dark", "hex": "#232E26"}, {"name": "bg-dark-alt", "hex": "#2E3D30"}, {"name": "bg-cream", "hex": "#EDE6D0"}, {"name": "bg-cream-alt", "hex": "#E4DAC4"}, {"name": "ink-cream", "hex": "#F0E8D2"}, {"name": "ink-dark", "hex": "#1E2820"}, {"name": "accent-orange", "hex": "#C07030"}, {"name": "wood-glow", "hex": "#7A4E24"}], "typography": ["Bricolage Grotesque", "DM Sans", "DM Mono"], "snapshot": "A warm, material-tactile presentation system inspired by a high-end product landing page. Dark forest green is the dominant environment, warmed by a low atmospheric wood-brown glow from the bottom-right corner of every dark slide. Cream type floats directly on the field; warm orange acts as the single accent. The typeface stack pairs Bricolage Grotesque (a heavy, rounded grotesque) for display with DM Sans for body and DM Mono for labels — the result reads as industrial-design portfolio meets boutique product launch, never tech demo.", "colors": {"bg": "#F0E8D2", "fg": "#1E2820", "accent": "#C07030", "accent2": "#7A4E24"}}, {"slug": "monochrome", "name": "Monochrome", "tagline": "Ivory ledger paper with all-black type; Lora serif headlines, Jost body, no color at all.", "mood": ["restrained", "literary", "archival", "ledger"], "tone": ["literary", "considered", "neutral", "honest"], "formality": "high", "density": "high", "scheme": "light", "best_for": "Anything that should feel like a hand-typeset ledger: user research synthesis, white papers, longform reports, academic and policy briefs, advisory deliverables, bilingual EN/CN reports. Equally good for tech, design, or brand decks that want their words to be the only thing on the page.", "avoid_for": "Decks that need visual personality or color-led storytelling — the all-ink palette is intentionally austere.", "palette": [{"name": "cream-paper", "hex": "#FAFADF"}, {"name": "cream-paper-2", "hex": "#F2F2D2"}, {"name": "cream-paper-3", "hex": "#F0F0D4"}, {"name": "cream-warm", "hex": "#F5F0E4"}, {"name": "ink-black", "hex": "#1A1A16"}, {"name": "ink-graphite", "hex": "#5E5E54"}, {"name": "ink-graphite-light", "hex": "#8A8A80"}], "typography": ["Jost", "JetBrains Mono", "Lora"], "snapshot": "A literary editorial system rendered in black ink on cream paper. Ultra-light geometric sans (Jost at weight 200–300) carries every headline; Lora italic serif handles quote text and insight-card titles; JetBrains Mono provides the structural chrome. There are no chromatic accents — every color in the palette is a graphite or cream tone, and \"accent\" simply means \"darker ink.\" The aesthetic borrows from independent research reports, scholarly monographs, and the quietest end of contemporary editorial design — closer to a printed journal than a tech presentation.", "colors": {"bg": "#FAFADF", "fg": "#1A1A16", "accent": "#F2F2D2", "accent2": "#F0F0D4"}}, {"slug": "neo-grid-bold", "name": "Neo-Grid Bold", "tagline": "Editorial neo-brutalism with a single neon yellow accent on off-white paper.", "mood": ["confident", "punchy", "editorial", "modern"], "tone": ["bold", "minimal", "design-led", "graphic"], "formality": "medium", "density": "high", "scheme": "light", "best_for": "Anything that should feel confident and editorial-graphic: design-led pitches, brand work, founder talks, conference keynotes. Excellent for stat-heavy slides, comparisons, and process flows. Just as strong for tech, research, or finance when the speaker wants to read as design-led rather than corporate.", "avoid_for": "Contexts that need to feel quiet, traditional, or warm — the neon-yellow accent and uppercase display commit to a confident editorial voice.", "palette": [{"name": "paper", "hex": "#F5F4EF"}, {"name": "bg", "hex": "#ECECE8"}, {"name": "ink", "hex": "#0A0A0A"}, {"name": "accent-lemon", "hex": "#E6FF3D"}, {"name": "muted", "hex": "#8A8A85"}, {"name": "stage-bg", "hex": "#1A1A1A"}], "typography": ["Space Grotesk", "JetBrains Mono"], "snapshot": "A heavy editorial poster system built on a strict 12-column × 8-row block grid with neon-yellow accents on putty-ecru. Space Grotesk at weight 700 in strict uppercase carries every display moment; JetBrains Mono carries every label and metadata tag. Each slide reads as a magazine spread divided into colored panels — paper-ecru, ink-black, and electric lemon-yellow trading roles across cells. The aesthetic borrows from contemporary editorial print, brutalist annual reports, and the populist-poster end of design week showcases.", "colors": {"bg": "#F5F4EF", "fg": "#0A0A0A", "accent": "#E6FF3D", "accent2": "#8A8A85"}}, {"slug": "peoples-platform", "name": "People's Platform (Block & Bold)", "tagline": "Activist poster energy: blue, orange, red on cream, with Alfa Slab + Caveat Brush.", "mood": ["activist", "loud", "graphic", "honest"], "tone": ["punchy", "direct", "expressive", "warm-bold"], "formality": "medium-low", "density": "medium-high", "scheme": "light", "best_for": "Anything that should feel honest, loud, and graphic: cultural commentary, manifestos, civic and community decks, design talks, campaign pitches. Excellent for founder-vision moments, mission statements, or any deck — including across industries — that wants protest-poster energy instead of corporate polish.", "avoid_for": "Contexts where institutional restraint is the actual goal — the saturated political-poster palette commits hard to expressive energy.", "palette": [{"name": "blue", "hex": "#2C2CDC"}, {"name": "blue-deep", "hex": "#1B1BB0"}, {"name": "orange", "hex": "#F2A03A"}, {"name": "orange-deep", "hex": "#E89321"}, {"name": "red", "hex": "#E83A2A"}, {"name": "red-deep", "hex": "#B7281C"}, {"name": "cream", "hex": "#F4E9D6"}, {"name": "paper", "hex": "#F5F2EA"}], "typography": ["Alfa Slab One", "Caveat Brush", "Archivo Narrow", "DM Mono"], "snapshot": "A WPA-poster-meets-political-campaign presentation system built on three typefaces and a five-color palette that reduces to three functional roles. Alfa Slab One — a compressed slab serif — does all the heavy lifting at extreme sizes in pure uppercase. Caveat Brush drops in as a handwritten human interrupt: lowercase, slightly rotated, emotionally warm. DM Mono carries all metadata at tight uppercase tracking. The palette is electric cobalt blue, amber orange, and hot red — with red functioning exclusively as a shadow/depth color, never as a surface fill. Every slide gets a paper grain overlay that makes the whole deck feel screen-printed. The aesthetic is loud, confident, and populist — the kind of visual language that belongs on a protest placard, a union newsletter, or a campaign bus.", "colors": {"bg": "#F5F2EA", "fg": "#1B1BB0", "accent": "#E89321", "accent2": "#E83A2A"}}, {"slug": "pin-and-paper", "name": "Pin & Paper", "tagline": "Ye "#C0C0C0"}, {"name": "bg-light", "hex": "#D4D0C8"}, {"name": "bg-dark", "hex": "#808080"}, {"name": "white", "hex": "#FFFFFF"}, {"name": "black", "hex": "#000000"}, {"name": "text-dark", "hex": "#222222"}, {"name": "blue-navy", "hex": "#000080"}, {"name": "blue-bright", "hex": "#0000A0"}], "typography": ["MS Sans Serif"], "snapshot": "A Windows 95 / 98 desktop-OS aesthetic rendered as a presentation system. Every slide is a window — beveled chrome, navy gradient title bar, MS Sans Serif body type, with chart areas, group boxes, and panels arranged as if they were software UI from 1995. The palette is the original Win9x system colors (gray button-face, navy title bars, white sunken inputs) with retro accent hues (DOS green, brick red, mustard yellow, teal cyan) reserved for status text and chart data. Pixel-font (Press Start 2P) and terminal-font (VT323) appear sparingly for nostalgic punctuation. The effect is half playful nostalgia, half functional dashboard — a deck that reads as a software product running on a CRT monitor.", "colors": {"bg": "#FFFFFF", "fg": "#000000", "accent": "#0000A0", "accent2": "#000080"}}, {"slug": "retro-zine", "name": "Retro Zine", "tagline": "Beige paper with green accent and Bebas Neue + Caveat: a riso-printed zine in HTML form.", "mood": ["crafted", "lo-fi", "underground", "warm-retro"], "tone": ["scrappy", "warm", "intentional", "DIY"], "formality": "medium-low", "density": "medium", "scheme": "light", "best_for": "Anything that should feel printed, lo-fi, and crafted: indie zines and publications, music / arts brands, creator portfolios, small-batch craft launches, community decks. Also a great underdog choice for tech, research, or business decks that want a riso-print warmth instead of digital polish.", "avoid_for": "Contexts that demand digital-native polish or fast modern-tech energy — the layered zine aesthetic intentionally feels handmade.", "palette": [{"name": "bg", "hex": "#C8B99A"}, {"name": "bg-dark", "hex": "#B8A98A"}, { and product-page-y.", "palette": [{"name": "paper", "hex": "#F1E6CB"}, {"name": "paper-dk", "hex": "#E5D6B0"}, {"name": "ink", "hex": "#3A2516"}, {"name": "red", "hex": "#E5392A"}, {"name": "pink", "hex": "#E54489"}, {"name": "orange", "hex": "#F09131"}, {"name": "green", "hex": "#3D9F47"}, {"name": "blue", "hex": "#3F8BC4"}], "typography": ["Big Shoulders Display", "Chinese or other CJK text"], "snapshot": "A cassette-package editorial system on warm cream paper with a six-color primary palette and warm-brown ink. Display type runs in Big Shoulders Display (condensed industrial display sans at weight 900); body in Albert Sans; tabular and tag content in JetBrains Mono; occasional Japanese accents in Noto Sans JP. The aesthetic borrows from 1970s consumer cassette packaging, Japanese print catalogues, and lo-fi product zines: petal-cluster blob clusters, diagonal multi-color ribbon bands, 12-point starburst seals, red rectangular stamps, and tracked uppercase micro-labels. The effect is hand-curated industrial editorial — warm but disciplined, playful but tightly typeset, with the cassette as its visual metaphor.", "colors": {"bg": "#F1E6CB", "fg": "#3A2516", "accent": "#F09131", "accent2": "#E5392A"}}, {"slug": "scatterbrain", "name": "Scatterbrain", "tagline": "Post-it inspired: pastel sticky notes, Caveat handwriting, Shrikhand and Zilla Slab type stack.", "mood": ["playful", "creative", "warm", "messy-on-purpose", "workshop"], "tone": ["informal", "warm", "expressive", "human"], "formality": "low", "density": "high", "scheme": "light", "best_for": "Anything that should feel like a designer's whiteboard: brainstorms, workshops, creative-agency credentials, design-thinking sessions, ideation pitches, art-direction reviews. Equally fun for any deck — including tech, research, or business — that wants to read as in-progress thinking rather than polished conclusions.", "avoid_for": "Contexts that demand precision and institutional weight — the post-it sticky-note aes xts that should feel hot, fast, or intentionally playful — the navy + gold restraint commits to a sober voice.", "palette": [{"name": "navy", "hex": "#1C2644"}, {"name": "navy-alt", "hex": "#232F55"}, {"name": "cream", "hex": "#F0ECE3"}, {"name": "cream-alt", "hex": "#E6E0D4"}, {"name": "text-warm", "hex": "#E2DCD0"}, {"name": "text-muted-dark", "hex": "#8A96A8"}, {"name": "text-hint-dark", "hex": "#4E5A6E"}, {"name": "ink", "hex": "#1A2030"}], "typography": ["Source Serif 4", "DM Sans", "IBM Plex Mono"], "snapshot": "A literary editorial presentation system in the spirit of a long-form magazine — The Economist's restraint crossed with a private intelligence briefing. Source Serif 4 carries every headline with roman/italic mixing mid-sentence in antique gold, DM Sans steps back for body, and IBM Plex Mono runs all the timestamps, kickers, and chrome. The dual surface system is warm cream paper (#F0ECE3) and deep editorial navy (#1C2644), connected by a single hot accent — antique gold (#C8A870) — used only on rules, italic emphasis, and numerical figures. A near-invisible 80px grid texture overlays every dark slide as a fingerprint. The effect is sober, considered, and a little bit aristocratic.", "colors": {"bg": "#F0ECE3", "fg": "#1A2030", "accent": "#232F55", "accent2": "#1C2644"}}, {"slug": "soft-editorial", "name": "Soft Editorial", "tagline": "Cormorant Garamond serif on warm paper with sage, blush, and lemon accents.", "mood": ["literary", "elegant", "quiet", "warm-classical"], "tone": ["literary", "considered", "warm", "magazine"], "formality": "high", "density": "low", "scheme": "light", "best_for": "Anything that should feel literary, elegant, and unhurried: editorial features, longform brand stories, gallery / museum decks, advisory deliverables, wedding / lifestyle media, founder essays. Equally good for tech, research, or business decks that want a Sunday-supplement warmth instead of corporate polish.", "avoid_for": "Decks that need visual heat or punch let selected = null;
let activeFilters = { scheme: null, formality: null, mood: null };
let query = "";

const esc = s => (s||"").replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function thumbHTML(t, big) {
  const c = t.colors;
  const tagBg = t.scheme === 'dark' ? 'rgba(255,255,255,.14)' : 'rgba(0,0,0,.08)';
  const dots = t.palette.slice(0, 7).map(p => `<span class="dot" style="background:${p.hex}"></span>`).join('');
  return `<div class="thumb" ${big?'style="height:100%"':''}>
    <div class="stage" style="background:${c.bg};color:${c.fg}">
      <div class="kick" style="color:${c.accent}">Title Slide</div>
      <div class="ttl">${esc(t.name)}</div>
      <div class="tl">${esc(t.tagline)}</div>
      <div class="rule" style="background:${c.accent}"></div>
    </div>
    <span class="scheme-tag" style="background:${tagBg};color:${c.fg}">${esc(t.scheme)}</span>
    <div class="dots">${dots}</div>
  </div>`;
}

function cardHTML(t) {
  const moods = t.mood.slice(0,3).map(m=>`<span class="tag mood">${esc(m)}</span>`).join('');
  const tones = t.tone.slice(0,2).map(m=>`<span class="tag">${esc(m)}</span>`).join('');
  const sel = selected===t.slug ? ' selected':'';
  return `<div class="card${sel}" data-slug="${t.slug}">
    ${thumbHTML(t,false)}
    <div class="body">
      <div class="name-row"><span class="name">${esc(t.name)}</span><span class="slug">${esc(t.slug)}</span></div>
      <p class="tagline">${esc(t.tagline)}</p>
      <div class="tags">${moods}${tones}</div>
      <div class="meta"><span><b>正式度</b> ${esc(t.formality)}</span><span><b>密度</b> ${esc(t.density)}</span><span><b>明暗</b> ${esc(t.scheme)}</span></div>
      <div class="actions">
        <button class="btn" data-act="detail">查看细节</button>
        <button class="btn primary" data-act="pick">${selected===t.slug?'✓ 已选用':'选用'}</button>
      </div>
    </div>
  </div>`;
}

function buildFilters() {
  const moods = [...new Set(DATA.flatMap(t=>t.mood))].sort();
  const fc = document.getElementById('filters');
  let h = '';
  h += `<span class="filter-label">明暗</span>`;
  ['dark','light'].forEach(s=> h += `<span class="chip" data-type="scheme" data-val="${s}">${s}</span>`);
  h += `<span class="filter-label" style="margin-left:8px">正式度</span>`;
  ['low','medium','high'].forEach(s=> h += `<span class="chip" data-type="formality" data-val="${s}">${s}</span>`);
  h += `<span class="filter-label" style="margin-left:8px">风格</span>`;
  moods.slice(0,14).forEach(m=> h += `<span class="chip" data-type="mood" data-val="${m}">${esc(m)}</span>`);
  h += `<span class="count" id="count"></span>`;
  fc.innerHTML = h;
  fc.querySelectorAll('.chip').forEach(ch=>{
    ch.onclick = ()=>{
      const ty=ch.dataset.type, val=ch.dataset.val;
      activeFilters[ty] = activeFilters[ty]===val ? null : val;
      render();
    };
  });
}

function matches(t){
  if(activeFilters.scheme && t.scheme!==activeFilters.scheme) return false;
  if(activeFilters.formality && t.formality!==activeFilters.formality) return false;
  if(activeFilters.mood && !t.mood.includes(activeFilters.mood)) return false;
  if(query){
    const blob=(t.name+' '+t.slug+' '+t.tagline+' '+t.mood.join(' ')+' '+t.tone.join(' ')+' '+t.best_for).toLowerCase();
    if(!blob.includes(query)) return false;
  }
  return true;
}

function render(){
  document.querySelectorAll('#filters .chip').forEach(ch=>{
    ch.classList.toggle('active', activeFilters[ch.dataset.type]===ch.dataset.val);
  });
  const list = DATA.filter(matches);
  const grid = document.getElementById('grid');
  grid.innerHTML = list.map(cardHTML).join('');
  document.getElementById('empty').style.display = list.length? 'none':'block';
  const cnt = document.getElementById('count');
  if(cnt) cnt.textContent = `${list.length} / ${DATA.length} 套`;
  grid.querySelectorAll('.card').forEach(card=>{
    const slug=card.dataset.slug;
    card.querySelector('[data-act="detail"]').onclick=e=>{e.stopPropagation();openDrawer(slug);};
    card.querySelector('[data-act="pick"]').onclick=e=>{e.stopPropagation();pick(slug);};
    card.querySelector('.thumb').onclick=()=>openDrawer(slug);
  });
}

function pick(slug){
  selected = selected===slug? null : slug;
  render(); updateSelbar();
}

function updateSelbar(){
  const bar=document.getElementById('selbar');
  if(!selected){ bar.classList.remove('show'); return; }
  const t=DATA.find(x=>x.slug===selected);
  bar.classList.add('show');
  document.getElementById('sel-name').textContent=t.name;
  document.getElementById('sel-slug').textContent=t.slug;
  document.getElementById('sel-color').style.background=t.colors.accent;
}

function openDrawer(slug){
  const t=DATA.find(x=>x.slug===slug);
  document.getElementById('d-name').textContent=t.name;
  document.getElementById('d-slug').textContent=t.slug;
  const sw=t.palette.map(p=>`<div class="sw"><i style="background:${p.hex}"></i><small>${esc(p.name)}</small><small>${p.hex}</small></div>`).join('');
  const fonts=(t.typography&&t.typography.length)? t.typography.map(f=>`<span class="tag">${esc(f)}</span>`).join('') : '<span class="tag">见完整 design.md</span>';
  const moods=t.mood.map(m=>`<span class="tag mood">${esc(m)}</span>`).join('');
  const tones=t.tone.map(m=>`<span class="tag">${esc(m)}</span>`).join('');
  document.getElementById('d-body').innerHTML = `
    <div class="big-thumb">${thumbHTML(t,true)}</div>
    <div class="sec"><h4>一句话</h4><p>${esc(t.tagline)}</p></div>
    <div class="sec"><h4>风格标签</h4><div class="tags">${moods}${tones}</div></div>
    <div class="sec"><h4>配色 Palette</h4><div class="swatches">${sw}</div></div>
    <div class="sec"><h4>字体 Typography</h4><div class="fontlist">${fonts}</div></div>
    ${t.snapshot? `<div class="sec"><h4>视觉描述</h4><p>${esc(t.snapshot)}</p></div>`:''}
    <div class="sec"><h4>适合 Best for</h4><p>${esc(t.best_for)}</p></div>
    ${t.avoid_for? `<div class="sec avoid"><h4 style="color:#b91c1c">慎用 Avoid for</h4><p>${esc(t.avoid_for)}</p></div>`:''}
    <div class="usecmd">在做项目时，告诉 Claude 用这套模板：<br><code>用 frontend-slides 的「${esc(t.name)}」(${esc(t.slug)}) 模板帮我做一份 PPT</code>
      <br><button class="copyslug" data-slug="${t.slug}">复制 slug：${esc(t.slug)}</button>
    </div>
    <div class="actions" style="margin-top:18px">
      <button class="btn primary" style="flex:1" id="d-pick">${selected===t.slug?'✓ 已选用':'选用这套'}</button>
    </div>`;
  document.getElementById('d-body').querySelector('.copyslug').onclick=e=>copy(e.target.dataset.slug);
  document.getElementById('d-pick').onclick=()=>{pick(slug);openDrawer(slug);};
  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}
function closeDrawer(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}
function copy(txt){
  navigator.clipboard?.writeText(txt).then(()=>toast('已复制：'+txt)).catch(()=>toast('已复制：'+txt));
}
function toast(msg){
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),1600);
}

document.getElementById('search').oninput=e=>{query=e.target.value.trim().toLowerCase();render();};
document.getElementById('overlay').onclick=closeDrawer;
document.getElementById('d-close').onclick=closeDrawer;
document.getElementById('sel-copy').onclick=()=>copy(selected);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer();});

buildFilters(); render();
</script>
</body>
</html>
