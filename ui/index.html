<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Web UI 模板库 · Template Library</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --ink:#111317; --muted:#6b7280; --line:#e7e8ec; --bg:#f5f6f8; --card:#fff;
    --brand:#4f46e5; --brand-soft:#eef2ff;
  }
  html,body{background:var(--bg);color:var(--ink)}
  body{font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",Inter,Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  header.top{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:16px 26px}
  .top-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap;max-width:1480px;margin:0 auto}
  .brandmark{font-weight:800;font-size:19px;letter-spacing:-.02em}
  .brandmark span{color:var(--brand)}
  .sub{color:var(--muted);font-size:13px;margin-top:3px}
  .grow{flex:1}
  .search{border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px 13px;font-size:14px;width:230px;outline:none}
  .search:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin:14px auto 0;max-width:1480px;align-items:center}
  .chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 14px;font-size:13px;cursor:pointer;transition:.12s;user-select:none}
  .chip:hover{border-color:#c7c9d1}
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .count{font-size:13px;color:var(--muted);margin-left:auto}
  main{padding:24px 26px 120px;max-width:1480px;margin:0 auto}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:24px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;transition:.16s}
  .card:hover{transform:translateY(-3px);box-shadow:0 16px 38px rgba(17,19,40,.12);border-color:#d6d8df}
  .preview{position:relative;width:100%;aspect-ratio:16/10;overflow:hidden;background:#0b0d12;border-bottom:1px solid var(--line)}
  /* scaled live iframe acts as a real thumbnail */
  .preview iframe{position:absolute;top:0;left:0;width:1320px;height:825px;border:0;transform:scale(.2727);transform-origin:top left;pointer-events:none;background:#fff}
  .preview .veil{position:absolute;inset:0;cursor:pointer}
  .preview .open-pill{position:absolute;bottom:12px;right:12px;background:rgba(17,19,23,.86);color:#fff;font-size:12px;padding:7px 12px;border-radius:8px;opacity:0;transition:.16s;backdrop-filter:blur(4px)}
  .card:hover .open-pill{opacity:1}
  .theme-tag{position:absolute;top:12px;left:12px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;padding:4px 8px;border-radius:6px;background:rgba(255,255,255,.85);color:#111;backdrop-filter:blur(4px)}
  .theme-tag.dark{background:rgba(0,0,0,.6);color:#fff}
  .body{padding:15px 17px 17px;display:flex;flex-direction:column;gap:9px}
  .name-row{display:flex;align-items:center;gap:9px}
  .dotc{width:11px;height:11px;border-radius:50%;flex:none}
  .name{font-size:16px;font-weight:700;letter-spacing:-.01em}
  .desc{font-size:12.5px;color:#566;line-height:1.45;min-height:34px}
  .tags{display:flex;flex-wrap:wrap;gap:6px}
  .tag{font-size:10.5px;color:#444;background:#f1f2f4;border-radius:6px;padding:3px 8px}
  .tag.cat{background:var(--brand-soft);color:#4338ca}
  .actions{display:flex;gap:8px;margin-top:3px}
  .btn{flex:1;border:1px solid var(--line);background:#fff;border-radius:9px;padding:9px;font-size:13px;font-weight:600;cursor:pointer;transition:.12s;text-align:center}
  .btn:hover{border-color:#c7c9d1}
  .btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .btn.primary:hover{background:#000}
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#111317;color:#fff;padding:11px 20px;border-radius:10px;font-size:13.5px;opacity:0;transition:.2s;z-index:80;pointer-events:none}
  .toast.show{opacity:1}
  .empty{text-align:center;color:var(--muted);padding:70px;font-size:14px}
  .hint{font-size:12px;color:var(--muted);margin-top:8px;max-width:1480px;margin-left:auto;margin-right:auto}
</style>
</head>

let activeCat=null, query="";
const esc=s=>(s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function buildFilters(){
  const fc=document.getElementById('filters');
  let h=`<span class="chip" data-cat="" >全部</span>`;
  Object.keys(CATS).forEach(k=> h+=`<span class="chip" data-cat="${k}">${CATS[k]}</span>`);
  h+=`<span class="count" id="count"></span>`;
  fc.innerHTML=h;
  fc.querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>{
    const c=ch.dataset.cat||null; activeCat=(activeCat===c)?null:c; if(!ch.dataset.cat)activeCat=null; render();
  });
}
function matches(t){
  if(activeCat && t.cat!==activeCat) return false;
  if(query){const b=(t.name+' '+t.cat+' '+CATS[t.cat]+' '+t.desc+' '+t.tags.join(' ')).toLowerCase(); if(!b.includes(query))return false;}
  return true;
}
function cardHTML(t){
  return `<div class="card" data-file="${t.file}">
    <div class="preview">
      <iframe src="templates/${t.file}" loading="lazy" title="${esc(t.name)} preview" scrolling="no"></iframe>
      <span class="theme-tag ${t.theme}">${t.theme==='dark'?'DARK':'LIGHT'}</span>
      <div class="veil" data-open="${t.file}"></div>
      <span class="open-pill">点击打开全屏 ↗</span>
    </div>
    <div class="body">
      <div class="name-row"><span class="dotc" style="background:${t.accent}"></span><span class="name">${esc(t.name)}</span></div>
      <div class="desc">${esc(t.desc)}</div>
      <div class="tags"><span class="tag cat">${CATS[t.cat]}</span>${t.tags.map(x=>`<span class="tag">${esc(x)}</span>`).join('')}</div>
      <div class="actions">
        <button class="btn" data-open="${t.file}">打开预览</button>
        <button class="btn primary" data-use="${t.file}" data-name="${esc(t.name)}">选用</button>
      </div>
    </div>
  </div>`;
}
function render(){
  document.querySelectorAll('#filters .chip').forEach(ch=>{
    const c=ch.dataset.cat; ch.classList.toggle('active', (c===''&&!activeCat) || (c&&c===activeCat));
  });
  const list=DATA.filter(matches);
  document.getElementById('grid').innerHTML=list.map(cardHTML).join('');
  document.getElementById('empty').style.display=list.length?'none':'block';
  const cnt=document.getElementById('count'); if(cnt)cnt.textContent=`${list.length} / ${DATA.length} 套`;
  document.querySelectorAll('[data-open]').forEach(el=>el.onclick=e=>{e.stopPropagation();window.open('templates/'+el.dataset.open,'_blank');});
  document.querySelectorAll('[data-use]').forEach(el=>el.onclick=e=>{
    e.stopPropagation();
    const p=`用 web-ui-templates 里的「${el.dataset.name}」(${el.dataset.use}) 这套模板帮我做一个页面，内容换成：`;
    navigator.clipboard?.writeText(p).then(()=>toast('已复制提示词，回到对话粘贴并补充你的内容')).catch(()=>toast('已复制：'+el.dataset.use));
  });
}
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),1900);}
buildFilters();render();
</script>
</body>
</html>
